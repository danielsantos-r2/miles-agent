// Cabin multipliers for Smiles/TAP (approx ratio vs J)
const CABIN_MULT = { Y: 0.35, W: 0.65, J: 1, F: 1.5 };

function getMiles(opt, cabin, region) {
  if (opt.program === "latam" && !opt.fixedMilesJ) {
    const tbl = LATAM_TABLE[region];
    return tbl ? tbl[cabin] : null;
  }
  if (opt.fixedMilesJ) {
    return Math.round(opt.fixedMilesJ * CABIN_MULT[cabin]);
  }
  return null;
}

// ── Build search URLs with pre-filled data ────────────────────────────────
function buildSearchUrl(site, origin, destCode, date, cabinId, paxCount) {
  const cabinAA = { Y: "ECONOMY", W: "PREMIUM_ECONOMY", J: "BUSINESS", F: "FIRST" }[cabinId] || "BUSINESS";
  const cabinSmiles = { Y: "ECONOMIC", W: "PREMIUM_ECONOMY", J: "BUSINESS", F: "FIRST" }[cabinId] || "BUSINESS";

  switch (site) {
    case "aa.com":
      return `https://www.aa.com/booking/find-flights?tripType=oneWay&searchType=Award&bookingType=award&locale=en_US&pax=${paxCount}&adult=${paxCount}&type=1&origin=${origin}&destination=${destCode}&departDate=${date}&cabin=${cabinAA}`;
    case "smiles.com.br":
      return `https://www.smiles.com.br/mfe/emissao-passagem/?adults=${paxCount}&cabin=${cabinSmiles}&children=0&departureDate=${date.replace(/-/g, "")}&infants=0&isFlexibleDateChecked=false&isRoundTrip=false&originAirport=${origin}&destinationAirport=${destCode}&tripType=1`;
    case "azul.com.br":
      return `https://www.voeazul.com.br/br/pt/home/selecao-voo?c[0].ds=${origin}&c[0].as=${destCode}&c[0].dt=${date}&p[0].t=ADT&p[0].c=${paxCount}&f.ct=${cabinSmiles === "BUSINESS" ? "Executive" : "Economic"}&cc=PTS`;
    case "flytap.com":
      return `https://www.flytap.com/en/booking?type=ow&from=${origin}&to=${destCode}&out=${date}&adt=${paxCount}&cls=${cabinId === "J" ? "C" : cabinId === "F" ? "F" : "Y"}&redemption=true`;
    case "delta.com":
      return `https://www.delta.com/flight-search/search?action=findFlights&tripType=ONE_WAY&from=${origin}&to=${destCode}&departureDate=${date}&paxCount=${paxCount}&cabin=${cabinAA}&awardTravel=true`;
    default:
      return `https://www.google.com/travel/flights?q=flights+${origin}+to+${destCode}+${date}`;
  }
}

// ── Availability sim — now per partner ─────────────────────────────────────
function simAvail(destObj, from, to) {
  const results = [], s = new Date(from), e = new Date(to);
  const partners = destObj.options.map(o => ({ partner: o.partner, program: o.program, search: o.search }));
  // Unique partners only (some dests have 2 LATAM options e.g. LHR)
  const uniq = [];
  const seen = new Set();
  for (const p of partners) {
    const k = p.partner;
    if (!seen.has(k)) { seen.add(k); uniq.push(p); }
  }

  for (let d = new Date(s); d <= e; d.setDate(d.getDate() + 1)) {
    const dayPartners = [];
    let bestEx = 0, bestEc = 0;

    for (let pi = 0; pi < uniq.length; pi++) {
      const p = uniq[pi];
      const seed = destObj.code.charCodeAt(0) + destObj.code.charCodeAt(1) + destObj.code.charCodeAt(2) + pi * 37;
      const h = (d.getDate() * 31 + d.getMonth() * 7 + seed + pi * 13) % 100;
      const we = d.getDay() === 0 || d.getDay() === 5 || d.getDay() === 6;
      const hi = d.getMonth() >= 5 && d.getMonth() <= 7;
      let ex = 0, ec = 0;
      if (h < (hi ? 25 : 45)) ex = we ? (h < 10 ? 1 : 0) : (h < 15 ? 2 : 1);
      if (h < 70) ec = Math.min(4, Math.floor(h / 15) + 1);
      if (ex > 0 || ec > 0) {
        dayPartners.push({ ...p, ex, ec });
        bestEx = Math.max(bestEx, ex);
        bestEc = Math.max(bestEc, ec);
      }
    }
    if (dayPartners.length > 0) {
      results.push({ date: new Date(d), ds: d.toISOString().split("T")[0], partners: dayPartners, ex: bestEx, ec: bestEc });
    }
  }
  return results;
}

  const [tab, setTab] = useState("search");
  const [saved, setSaved] = useState([]);
  const [regionFilter, setRegionFilter] = useState("");

  // Compute date window from target + range
  const df = useMemo(() => {
    if (range === 0) return targetDate;
    const d = new Date(targetDate + "T12:00:00");
    d.setDate(d.getDate() - range);
    return d.toISOString().split("T")[0];
  }, [targetDate, range]);
  const dt = useMemo(() => {
    if (range === 0) return targetDate;
    const d = new Date(targetDate + "T12:00:00");
    d.setDate(d.getDate() + range);
    return d.toISOString().split("T")[0];
  }, [targetDate, range]);
  const rangeLabel = range === 0 ? "Dia exato" : `±${range} dias (${range * 2} dias)`;

  const dest = useMemo(() => DESTS.find(d => d.code === destCode), [destCode]);
  const regions = useMemo(() => [...new Set(DESTS.map(d => d.region))], []);
  const filteredDests = useMemo(() => regionFilter ? DESTS.filter(d => d.region === regionFilter) : DESTS, [regionFilter]);

  // Add all destinations as possible origins for return legs
  const allOrigins = useMemo(() => {
    const extra = DESTS.map(d => ({ code: d.code, city: `${d.city} (${d.code})`, short: d.code }));
    return [...ORIGINS, ...extra.filter(e => !ORIGINS.find(o => o.code === e.code))];
  }, []);

  const doSearch = useCallback(() => {
    if (!dest) return;
    setSearching(true); setRes(null); setSelDate(null);
    setTimeout(() => { setRes(simAvail(dest, df, dt)); setSearching(false); }, 800);
  }, [dest, df, dt, range]);

  const sorted = useMemo(() => {
    if (!dest) return [];
    return [...dest.options].map(o => {
      const m = getMiles(o, cabin, dest.region);
      return { ...o, miles: m };
    }).sort((a, b) => {
      if (a.bestPick && !b.bestPick) return -1;
      if (!a.bestPick && b.bestPick) return 1;
      if (a.miles && b.miles) return a.miles - b.miles;
      return a.miles ? -1 : 1;
    });
  }, [dest, cabin]);

  const goodDates = res ? res.filter(r => r.ex >= pax) : [];
  const cabinLabel = CABINS.find(c => c.id === cabin)?.label || "Executiva";

  const S = {
    input: { width: "100%", padding: "8px 6px", borderRadius: 6, border: "1.5px solid #2d2a3e", background: "#12102a", color: "#e2e8f0", fontSize: 12, boxSizing: "border-box", appearance: "none", WebkitAppearance: "none" },
    label: { fontSize: 9, color: "#94a3b8", fontWeight: 600, textTransform: "uppercase", letterSpacing: 0.8, display: "block", marginBottom: 3 },
    card: { padding: 10, borderRadius: 8, background: "#12102a", border: "1px solid #2d2a3e" },
    mono: { fontFamily: "'Space Mono', monospace" },
  };

  function SearchLink({ site, label, color, date }) {
    const d = date || df;
    const url = buildSearchUrl(site, origin, destCode, d, cabin, pax);
    return (
      <a href={url} target="_blank" rel="noopener noreferrer" style={{
        padding: "7px 10px", borderRadius: 5, background: color, color: "#fff",
        fontSize: 10, fontWeight: 600, textDecoration: "none", textAlign: "center", flex: 1,
      }}>{label}</a>
    );
  }

  return (
    <div style={{ minHeight: "100vh", background: "linear-gradient(155deg, #0c0a1a 0%, #11102a 40%, #090818 100%)", color: "#e2e8f0", fontFamily: "'DM Sans', sans-serif", padding: "14px 12px" }}>
      <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />

      {/* Header */}
      <div style={{ textAlign: "center", marginBottom: 14 }}>
        <div style={{ fontSize: 9, ...S.mono, color: "#818cf8", letterSpacing: 3, textTransform: "uppercase" }}>Miles Agent</div>
        <h1 style={{ fontSize: 17, fontWeight: 700, margin: "2px 0", background: "linear-gradient(135deg, #c7d2fe, #818cf8)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>Consultor de Milhas</h1>
        <div style={{ fontSize: 10, color: "#64748b" }}>
          iupp: <strong style={{ color: "#4ade80" }}>{fmt(IUPP)}</strong> · {Object.values(PROGRAMS).map((p, i) => <span key={p.short}><span style={{ color: p.color, fontWeight: 600 }}>{p.short}</span>{i < 3 ? " · " : ""}</span>)}
        </div>
      </div>

      {/* Tabs */}
      <div style={{ display: "flex", marginBottom: 12, borderRadius: 7, overflow: "hidden", border: "1px solid #2d2a3e" }}>
        {[{ id: "search", l: "Buscar" }, { id: "compare", l: "Comparar" }, { id: "saved", l: `Salvos (${saved.length})` }].map(t => (
          <button key={t.id} onClick={() => setTab(t.id)} style={{
            flex: 1, padding: "8px 0", fontSize: 10, fontWeight: 600, border: "none",
            background: tab === t.id ? "#1e1b3a" : "#0c0a1a", color: tab === t.id ? "#818cf8" : "#64748b", cursor: "pointer",
          }}>{t.l}</button>
        ))}
      </div>

      {/* ═══ SEARCH ═══ */}
      {tab === "search" && <>
        {/* Origin & Destination dropdowns */}
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6, marginBottom: 8 }}>
          <div>
            <label style={S.label}>Origem</label>
            <select value={origin} onChange={e => setOrigin(e.target.value)} style={S.input}>
              <optgroup label="São Paulo">
                {ORIGINS.filter(o => ["GRU","CGH","VCP"].includes(o.code)).map(o => <option key={o.code} value={o.code}>{o.short} — {o.city.split("(")[0].trim()}</option>)}
              </optgroup>
              <optgroup label="Outros BR">
                {ORIGINS.filter(o => !["GRU","CGH","VCP"].includes(o.code)).map(o => <option key={o.code} value={o.code}>{o.short} — {o.city.split("(")[0].trim()}</option>)}
              </optgroup>
              <optgroup label="Internacionais (volta)">
                {DESTS.map(d => <option key={d.code} value={d.code}>{d.flag} {d.code} — {d.city}</option>)}
              </optgroup>
            </select>
          </div>
          <div>
            <label style={S.label}>Destino</label>
            <select value={destCode} onChange={e => { setDestCode(e.target.value); setRes(null); setSelDate(null); }} style={{ ...S.input, color: destCode ? "#e2e8f0" : "#64748b" }}>
              <option value="">Selecione...</option>
              {regions.map(r => (
                <optgroup key={r} label={r}>
                  {DESTS.filter(d => d.region === r).map(d => (
                    <option key={d.code} value={d.code}>{d.flag} {d.city} ({d.code})</option>
                  ))}
                </optgroup>
              ))}
            </select>
          </div>
        </div>

        {/* Cabin & Pax */}
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6, marginBottom: 8 }}>
          <div>
            <label style={S.label}>Classe</label>
            <select value={cabin} onChange={e => setCabin(e.target.value)} style={S.input}>
              {CABINS.map(c => <option key={c.id} value={c.id}>{c.label}</option>)}
            </select>
          </div>
          <div>
            <label style={S.label}>Passageiros</label>
            <div style={{ display: "flex", borderRadius: 6, overflow: "hidden", border: "1.5px solid #2d2a3e" }}>
              {[1, 2, 3, 4].map(p => (
                <button key={p} onClick={() => setPax(p)} style={{
                  flex: 1, padding: "7px 0", fontSize: 11, fontWeight: 600, border: "none",
                  background: pax === p ? "#1e1b3a" : "#0c0a1a", color: pax === p ? "#818cf8" : "#64748b", cursor: "pointer",
                }}>{p}</button>
              ))}
            </div>
          </div>
        </div>

        {/* Date, Range & Bonus */}
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 5, marginBottom: 6 }}>
          <div>
            <label style={S.label}>Data alvo</label>
            <input type="date" value={targetDate} onChange={e => setTargetDate(e.target.value)} style={S.input} />
          </div>
          <div>
            <label style={S.label}>Flexibilidade</label>
            <select value={range} onChange={e => setRange(Number(e.target.value))} style={S.input}>
              <option value={0}>Dia exato</option>
              <option value={2}>±2 dias</option>
              <option value={5}>±5 dias</option>
              <option value={10}>±10 dias</option>
              <option value={15}>±15 dias (~1 mês)</option>
            </select>
          </div>
        </div>
        {range > 0 && (
          <div style={{ fontSize: 9, color: "#64748b", marginBottom: 8, textAlign: "center" }}>
            Buscando de <strong style={{ color: "#94a3b8" }}>{new Date(df + "T12:00:00").toLocaleDateString("pt-BR", { day: "2-digit", month: "2-digit" })}</strong> a <strong style={{ color: "#94a3b8" }}>{new Date(dt + "T12:00:00").toLocaleDateString("pt-BR", { day: "2-digit", month: "2-digit" })}</strong> ({range * 2} dias)
          </div>
        )}
        <div style={{ display: "grid", gridTemplateColumns: "1fr", gap: 5, marginBottom: 12 }}>
          <div>
            <label style={S.label}>Bônus iupp</label>
            <select value={bonus} onChange={e => setBonus(Number(e.target.value))} style={S.input}>
              {[0, 50, 80, 100].map(b => <option key={b} value={b}>{b === 0 ? "Sem bônus" : `${b}%`}</option>)}
            </select>
          </div>
        </div>

        {/* Options per program */}
        {dest && <>
          <div style={{ fontSize: 11, fontWeight: 700, marginBottom: 6, color: "#c7d2fe" }}>
            {dest.flag} {origin}→{dest.city} · {cabinLabel} · i/v {pax}pax
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: 6, marginBottom: 12 }}>
            {sorted.map((o, i) => {
              const p = PROGRAMS[o.program];
              const rt = o.miles ? o.miles * 2 * pax : null;
              const pts = rt ? iuppCost(rt, bonus) : null;
              const rem = pts != null ? IUPP - pts : null;
              const route = o.route.replace("{O}", origin);
              return (
                <div key={i} style={{ ...S.card, borderColor: o.bestPick ? p.color + "50" : "#2d2a3e", position: "relative" }}>
                  {o.bestPick && <span style={{ position: "absolute", top: -7, right: 8, fontSize: 8, fontWeight: 700, padding: "0 6px", borderRadius: 3, background: "#052e16", color: "#4ade80", border: "1px solid #166534" }}>MELHOR</span>}
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
                    <Pill program={o.program} />
                    <span style={{ fontSize: 9, color: "#64748b" }}>{p.type}</span>
                  </div>
                  <div style={{ fontSize: 10, color: "#94a3b8", marginBottom: 2 }}>
                    <strong style={{ color: "#c7d2fe" }}>{o.partner}</strong> — {route}
                  </div>
                  {rt ? (
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 3, marginTop: 6 }}>
                      <div><div style={{ fontSize: 8, color: "#64748b", textTransform: "uppercase" }}>Milhas</div><div style={{ fontSize: 12, fontWeight: 700, ...S.mono }}>{fmt(rt)}</div></div>
                      <div><div style={{ fontSize: 8, color: "#64748b", textTransform: "uppercase" }}>iupp ({bonus}%)</div><div style={{ fontSize: 12, fontWeight: 700, ...S.mono, color: "#818cf8" }}>{fmt(pts)}</div></div>
                      <div><div style={{ fontSize: 8, color: "#64748b", textTransform: "uppercase" }}>Sobra</div><div style={{ fontSize: 12, fontWeight: 700, ...S.mono, color: rem >= 200000 ? "#4ade80" : rem >= 0 ? "#fbbf24" : "#f87171" }}>{fmt(rem)}</div></div>
                    </div>
                  ) : (
                    <div style={{ marginTop: 6, fontSize: 11, color: "#fbbf24", fontStyle: "italic" }}>Preço dinâmico — verificar no site</div>
                  )}
                  {(o.surcharge || o.note) && (
                    <div style={{ display: "flex", gap: 3, marginTop: 5, flexWrap: "wrap" }}>
                      {o.surcharge && <span style={{ fontSize: 8, padding: "1px 5px", borderRadius: 3, background: o.surcharge.includes("ALTO") ? "#7f1d1d" : "#1e1b3a", color: o.surcharge.includes("ALTO") ? "#fca5a5" : "#94a3b8", border: "1px solid " + (o.surcharge.includes("ALTO") ? "#991b1b" : "#2d2a3e") }}>Taxa: {o.surcharge}</span>}
                      {o.note && <span style={{ fontSize: 8, padding: "1px 5px", borderRadius: 3, background: "#1e1b3a", color: "#94a3b8", border: "1px solid #2d2a3e" }}>{o.note}</span>}
                    </div>
                  )}
                  <div style={{ marginTop: 6 }}>
                    <SearchLink site={o.search} label={`Buscar no ${o.search} →`} color={p.color} />
                  </div>
                </div>
              );
            })}
          </div>
        </>}

        {/* Search availability */}
        <button onClick={doSearch} disabled={!dest || searching} style={{
          width: "100%", padding: 11, borderRadius: 8, border: "none",
          background: dest ? "linear-gradient(135deg, #4f46e5, #7c3aed)" : "#2d2a3e",
          color: dest ? "#fff" : "#64748b", fontSize: 12, fontWeight: 700,
          cursor: dest ? "pointer" : "not-allowed", marginBottom: 14, opacity: searching ? 0.6 : 1,
        }}>{searching ? "Buscando..." : range === 0 ? "Simular Disponibilidade (dia exato)" : `Simular Disponibilidade (${range * 2} dias)`}</button>

        {/* Calendar */}
        {res && <>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
            <span style={{ fontSize: 11, fontWeight: 600 }}>Calendário (melhor parceira/dia)</span>
            <span style={{ fontSize: 9, color: goodDates.length > 0 ? "#4ade80" : "#f87171" }}>{goodDates.length} datas c/ {pax}+</span>
          </div>
          <div style={{ display: "flex", gap: 8, marginBottom: 4, fontSize: 8, color: "#94a3b8" }}>
            {[["#052e16","#166534","2+ exec"],["#422006","#854d0e","1 exec"],["#1e1b3a","#3730a3","econ only"]].map(([bg,bd,l]) => (
              <span key={l}><span style={{ display: "inline-block", width: 7, height: 7, borderRadius: 2, background: bg, border: `1px solid ${bd}`, marginRight: 2, verticalAlign: "middle" }} />{l}</span>
            ))}
            <span><span style={{ display: "inline-block", width: 7, height: 7, borderRadius: 2, background: "transparent", border: "1.5px solid #c084fc", marginRight: 2, verticalAlign: "middle" }} />alvo</span>
          </div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 2, marginTop: 4 }}>
            {(() => {
              const days = [], s = new Date(df), e = new Date(dt), dm = {};
              res.forEach(r => { dm[r.ds] = r; });
              for (let d = new Date(s); d <= e; d.setDate(d.getDate() + 1)) days.push(new Date(d));
              return days.map(day => {
                const k = day.toISOString().split("T")[0], r = dm[k];
                const isTarget = k === targetDate;
                let bg = "#1e1b2e", bd = "#2d2a3e";
                if (r?.ex >= 2) { bg = "#052e16"; bd = "#166534"; }
                else if (r?.ex === 1) { bg = "#422006"; bd = "#854d0e"; }
                else if (r?.ec > 0) { bg = "#1e1b3a"; bd = "#3730a3"; }
                if (selDate === k) bd = "#e2e8f0";
                else if (isTarget) bd = "#c084fc";
                return (
                  <button key={k} onClick={() => r && setSelDate(k)} style={{
                    width: 34, height: 34, borderRadius: 5, fontSize: 10, fontWeight: 500,
                    background: bg, border: `1.5px solid ${bd}`, color: "#e2e8f0",
                    cursor: r ? "pointer" : "default", opacity: r ? 1 : 0.2,
                    display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
                  }}>
                    <span style={{ fontSize: 8, opacity: 0.5 }}>{day.toLocaleDateString("pt-BR", { weekday: "narrow" })}</span>
                    <span>{day.getDate()}</span>
                  </button>
                );
              });
            })()}
          </div>
          {!selDate && res.length > 0 && (
            <div style={{ marginTop: 8, fontSize: 9, color: "#64748b", textAlign: "center", fontStyle: "italic" }}>
              Toque em uma data para ver disponibilidade por companhia aérea
            </div>
          )}

          {selDate && (() => {
            const r = res.find(x => x.ds === selDate);
            if (!r) return null;
            return (
              <div style={{ marginTop: 12, padding: 10, borderRadius: 8, background: "#1e1b3a", border: "1px solid #2d2a3e" }}>
                <div style={{ fontSize: 12, fontWeight: 700, marginBottom: 8 }}>
                  {new Date(r.ds + "T12:00:00").toLocaleDateString("pt-BR", { weekday: "long", day: "numeric", month: "long" })}
                </div>

                {/* Per-partner breakdown */}
                <div style={{ fontSize: 9, color: "#94a3b8", marginBottom: 5, textTransform: "uppercase", fontWeight: 600, letterSpacing: 0.5 }}>Disponibilidade por companhia:</div>
                <div style={{ display: "flex", flexDirection: "column", gap: 5, marginBottom: 10 }}>
                  {r.partners.map((p, pi) => {
                    const progData = PROGRAMS[p.program];
                    const hasEnough = p.ex >= pax;
                    return (
                      <div key={pi} style={{
                        padding: 8, borderRadius: 6, background: "#12102a",
                        border: `1px solid ${hasEnough ? "#166534" : "#2d2a3e"}`,
                      }}>
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
                          <div style={{ display: "flex", alignItems: "center", gap: 5 }}>
                            <Pill program={p.program} tiny />
                            <span style={{ fontSize: 11, fontWeight: 600, color: "#c7d2fe" }}>{p.partner}</span>
                          </div>
                          <div style={{ display: "flex", gap: 4 }}>
                            <span style={{
                              fontSize: 9, padding: "1px 6px", borderRadius: 3, fontWeight: 700,
                              background: p.ex >= 2 ? "#052e16" : p.ex === 1 ? "#422006" : "#1e1b2e",
                              color: p.ex >= 2 ? "#4ade80" : p.ex === 1 ? "#fbbf24" : "#64748b",
                              border: `1px solid ${p.ex >= 2 ? "#166534" : p.ex === 1 ? "#854d0e" : "#2d2a3e"}`,
                            }}>{p.ex}x exec</span>
                            <span style={{
                              fontSize: 9, padding: "1px 6px", borderRadius: 3, fontWeight: 600,
                              background: "#1e1b3a", color: "#94a3b8", border: "1px solid #2d2a3e",
                            }}>{p.ec}x econ</span>
                          </div>
                        </div>
                        {hasEnough && (
                          <div style={{ fontSize: 9, color: "#4ade80", marginBottom: 4 }}>✅ {pax} assentos em {cabin === "J" || cabin === "F" ? "executiva" : "econômica"}!</div>
                        )}
                        <a href={buildSearchUrl(p.search, origin, destCode, r.ds, cabin, pax)}
                          target="_blank" rel="noopener noreferrer" style={{
                            display: "block", padding: "5px 0", borderRadius: 4, textAlign: "center",
                            background: progData.color, color: "#fff", fontSize: 9, fontWeight: 600,
                            textDecoration: "none",
                          }}>
                          Verificar no {p.search} →
                        </a>
                      </div>
                    );
                  })}
                </div>

                <button onClick={() => setSaved(p => [...p, { dest, origin, date: selDate, cabin, pax, bonus, id: Date.now() }])} style={{
                  width: "100%", padding: "7px 10px", borderRadius: 5, border: "1px solid #2d2a3e",
                  background: "#12102a", color: "#818cf8", fontSize: 10, fontWeight: 600, cursor: "pointer",
                }}>💾 Salvar esta data</button>
              </div>
            );
          })()}
        </>}
      </>}

      {/* ═══ COMPARE ═══ */}
      {tab === "compare" && <div>
        <div style={{ fontSize: 11, fontWeight: 700, marginBottom: 4, color: "#c7d2fe" }}>{cabinLabel} i/v {pax}pax · Bônus {bonus}%</div>
        <div style={{ display: "flex", gap: 3, marginBottom: 10, flexWrap: "wrap" }}>
          <button onClick={() => setRegionFilter("")} style={{ padding: "3px 7px", borderRadius: 3, fontSize: 8, fontWeight: 600, border: "1px solid #2d2a3e", background: !regionFilter ? "#1e1b3a" : "#0c0a1a", color: !regionFilter ? "#e2e8f0" : "#64748b", cursor: "pointer" }}>Todos</button>
          {regions.map(r => (
            <button key={r} onClick={() => setRegionFilter(regionFilter === r ? "" : r)} style={{
              padding: "3px 7px", borderRadius: 3, fontSize: 8, fontWeight: 600,
              border: `1px solid ${regionFilter === r ? (REGION_COLORS[r] || "#818cf8") + "60" : "#2d2a3e"}`,
              background: regionFilter === r ? (REGION_COLORS[r] || "#818cf8") + "15" : "#0c0a1a",
              color: regionFilter === r ? REGION_COLORS[r] : "#64748b", cursor: "pointer",
            }}>{r}</button>
          ))}
        </div>
        {(regionFilter ? DESTS.filter(d => d.region === regionFilter) : DESTS)
          .map(d => {
            const opts = d.options.map(o => ({ ...o, miles: getMiles(o, cabin, d.region) })).filter(o => o.miles);
            const best = opts.sort((a, b) => a.miles - b.miles)[0];
            return best ? { d, best } : null;
          }).filter(Boolean)
          .sort((a, b) => iuppCost(a.best.miles * 2 * pax, bonus) - iuppCost(b.best.miles * 2 * pax, bonus))
          .map(({ d, best }) => {
            const cost = iuppCost(best.miles * 2 * pax, bonus);
            const pct = Math.min(100, (cost / IUPP) * 100);
            return (
              <div key={d.code} onClick={() => { setDestCode(d.code); setTab("search"); setRes(null); }} style={{ ...S.card, marginBottom: 5, cursor: "pointer" }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 3 }}>
                  <span style={{ fontSize: 12, fontWeight: 600 }}>{d.flag} {d.city}</span>
                  <div style={{ display: "flex", alignItems: "center", gap: 5 }}>
                    <Pill program={best.program} tiny />
                    <span style={{ fontSize: 12, fontWeight: 700, ...S.mono, color: "#818cf8" }}>{fmt(cost)}</span>
                  </div>
                </div>
                <div style={{ height: 3, borderRadius: 2, background: "#2d2a3e", overflow: "hidden" }}>
                  <div style={{ width: `${pct}%`, height: "100%", borderRadius: 2, background: pct > 70 ? "#f87171" : pct > 40 ? "#fbbf24" : "#4ade80" }} />
                </div>
                <div style={{ display: "flex", justifyContent: "space-between", marginTop: 2, fontSize: 8, color: "#64748b" }}>
                  <span>{best.partner} · {fmt(best.miles * 2 * pax)} milhas</span>
                  <span>{Math.round(pct)}% do saldo</span>
                </div>
              </div>
            );
          })}
      </div>}

      {/* ═══ SAVED ═══ */}
      {tab === "saved" && <div>
        {saved.length === 0 ? (
          <div style={{ textAlign: "center", padding: 32, color: "#64748b", fontSize: 11 }}>Nenhuma busca salva.</div>
        ) : saved.map(s => (
          <div key={s.id} style={{ ...S.card, marginBottom: 5 }}>
            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 3 }}>
              <span style={{ fontSize: 12, fontWeight: 700 }}>{s.dest.flag} {s.origin}→{s.dest.city}</span>
              <span style={{ fontSize: 10, color: "#94a3b8" }}>{new Date(s.date + "T12:00:00").toLocaleDateString("pt-BR")}</span>
            </div>
            <div style={{ fontSize: 9, color: "#94a3b8", marginBottom: 6 }}>{CABINS.find(c => c.id === s.cabin)?.label} · {s.pax}pax · Bônus {s.bonus}%</div>
            <div style={{ display: "flex", gap: 4 }}>
              {["aa.com", "smiles.com.br", "flytap.com"].map(site => {
                const url = buildSearchUrl(site, s.origin, s.dest.code, s.date, s.cabin, s.pax);
                const colors = { "aa.com": "#e11d48", "smiles.com.br": "#f97316", "flytap.com": "#059669" };
                const labels = { "aa.com": "AA", "smiles.com.br": "Smiles", "flytap.com": "TAP" };
                return <a key={site} href={url} target="_blank" rel="noopener noreferrer" style={{ flex: 1, padding: 6, borderRadius: 5, background: colors[site], color: "#fff", fontSize: 9, fontWeight: 600, textAlign: "center", textDecoration: "none" }}>{labels[site]}</a>;
              })}
              <button onClick={() => setSaved(p => p.filter(x => x.id !== s.id))} style={{ padding: "6px 8px", borderRadius: 5, border: "1px solid #2d2a3e", background: "#12102a", color: "#f87171", fontSize: 9, cursor: "pointer" }}>✕</button>
            </div>
          </div>
        ))}
      </div>}
