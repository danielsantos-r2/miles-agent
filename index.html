const CABIN_MULT = { Y: 0.35, W: 0.65, J: 1, F: 1.5 };

function getMiles(opt, cabin, region) {
  if (opt.program === "latam" && !opt.fixedMilesJ) return LATAM_TABLE[region]?.[cabin] || null;
  if (opt.fixedMilesJ) return Math.round(opt.fixedMilesJ * CABIN_MULT[cabin]);
  return null;
}

function buildSearchUrl(site, origin, destCode, date, cabinId, paxCount) {
  const cAA = { Y: "ECONOMY", W: "PREMIUM_ECONOMY", J: "BUSINESS", F: "FIRST" }[cabinId] || "BUSINESS";
  const cSm = { Y: "ECONOMIC", W: "PREMIUM_ECONOMY", J: "BUSINESS", F: "FIRST" }[cabinId] || "BUSINESS";
  switch (site) {
    case "aa.com": return `https://www.aa.com/booking/find-flights?tripType=oneWay&searchType=Award&bookingType=award&locale=en_US&pax=${paxCount}&adult=${paxCount}&type=1&origin=${origin}&destination=${destCode}&departDate=${date}&cabin=${cAA}`;
    case "smiles.com.br": return `https://www.smiles.com.br/mfe/emissao-passagem/?adults=${paxCount}&cabin=${cSm}&children=0&departureDate=${date.replace(/-/g,"")}&infants=0&isFlexibleDateChecked=false&isRoundTrip=false&originAirport=${origin}&destinationAirport=${destCode}&tripType=1`;
    case "azul.com.br": return `https://www.voeazul.com.br/br/pt/home/selecao-voo?c[0].ds=${origin}&c[0].as=${destCode}&c[0].dt=${date}&p[0].t=ADT&p[0].c=${paxCount}&f.ct=${cSm==="BUSINESS"?"Executive":"Economic"}&cc=PTS`;
    case "flytap.com": return `https://www.flytap.com/en/booking?type=ow&from=${origin}&to=${destCode}&out=${date}&adt=${paxCount}&cls=${cabinId==="J"?"C":cabinId==="F"?"F":"Y"}&redemption=true`;
    case "delta.com": return `https://www.delta.com/flight-search/search?action=findFlights&tripType=ONE_WAY&from=${origin}&to=${destCode}&departureDate=${date}&paxCount=${paxCount}&cabin=${cAA}&awardTravel=true`;
    default: return `https://www.google.com/travel/flights?q=flights+${origin}+to+${destCode}+${date}`;
  }
}

// ── Estimation engine (improved patterns per airline) ──────────────────────
function estimateAvail(destObj, from, to) {
  const results = [], s = new Date(from), e = new Date(to);
  const partners = [];
  const seen = new Set();
  for (const o of destObj.options) { if (!seen.has(o.partner)) { seen.add(o.partner); partners.push(o); } }

  for (let d = new Date(s); d <= e; d.setDate(d.getDate() + 1)) {
    const dow = d.getDay();
    const month = d.getMonth();
    const dom = d.getDate();
    const isHigh = month >= 5 && month <= 7;
    const isWeekend = dow === 0 || dow === 5 || dow === 6;
    // Days from today — closer dates have less availability
    const daysOut = Math.floor((d - new Date()) / 86400000);
    const dayPartners = [];
    let bestLikelihood = 0;

    for (let pi = 0; pi < partners.length; pi++) {
      const o = partners[pi];
      const prog = o.program;
      let likelihood = 50; // base 50%

      // Airline-specific patterns
      if (o.partner.includes("Iberia")) {
        // Iberia: good availability 330+ days out, releases 1-2 seats, worse in Jul-Aug
        likelihood = daysOut > 300 ? 70 : daysOut > 200 ? 55 : daysOut > 60 ? 35 : 20;
        if (isHigh) likelihood -= 15;
        if (isWeekend) likelihood -= 10;
      } else if (o.partner.includes("British Airways")) {
        likelihood = daysOut > 300 ? 45 : daysOut > 200 ? 35 : 15;
        if (isHigh) likelihood -= 20; // BA very scarce in summer
      } else if (o.partner.includes("Air France") || o.partner.includes("KLM")) {
        likelihood = daysOut > 250 ? 40 : daysOut > 100 ? 30 : 20;
        if (isHigh) likelihood -= 10;
      } else if (o.partner.includes("TAP")) {
        likelihood = daysOut > 300 ? 60 : daysOut > 150 ? 45 : 25;
      } else if (o.partner.includes("Qatar")) {
        likelihood = daysOut > 300 ? 50 : daysOut > 200 ? 40 : daysOut > 30 ? 20 : 35; // releases close-in
        if (isHigh) likelihood -= 5; // Qatar less affected by BR summer
      } else if (o.partner.includes("Delta")) {
        likelihood = daysOut > 300 ? 55 : daysOut > 150 ? 40 : 20;
        if (isHigh) likelihood -= 15;
      } else if (o.partner.includes("GOL") || o.partner.includes("Avianca") || o.partner.includes("Copa")) {
        likelihood = 60; // generally more available
        if (isHigh) likelihood -= 10;
      } else if (o.partner.includes("Azul")) {
        likelihood = 50;
      } else if (o.partner.includes("Aerolíneas")) {
        likelihood = 55;
      } else if (o.partner.includes("Aeromexico")) {
        likelihood = 45;
        if (isHigh) likelihood -= 10;
      } else if (o.partner.includes("Japan Airlines") || o.partner.includes("Qantas")) {
        likelihood = daysOut > 300 ? 40 : 15; // very scarce
      } else {
        likelihood = 40;
      }

      // Weekday mid-week tends better
      if (dow >= 1 && dow <= 3) likelihood += 5;
      // Very close dates sometimes open up (last minute releases)
      if (daysOut < 14 && daysOut > 0) likelihood += 10;

      likelihood = Math.max(5, Math.min(95, likelihood));
      bestLikelihood = Math.max(bestLikelihood, likelihood);

      dayPartners.push({
        partner: o.partner, program: o.program, search: o.search,
        route: o.route, surcharge: o.surcharge, note: o.note,
        likelihood,
      });
    }
    results.push({ date: new Date(d), ds: d.toISOString().split("T")[0], partners: dayPartners, bestLikelihood });
  }
  return results;
}

  const p = PROGRAMS[program];
  return <span style={{ display: "inline-flex", padding: tiny ? "0 4px" : "1px 6px", borderRadius: 3, fontSize: tiny ? 8 : 9, fontWeight: 700, background: p.color + "20", color: p.color, border: `1px solid ${p.color}40`, lineHeight: "16px" }}>{p.short}</span>;
}

    setSearching(true); setRes(null); setSelDate(null);
    setTimeout(() => { setRes(estimateAvail(dest, df, dt)); setSearching(false); }, 600);
  }, [dest, df, dt]);

  const cabinLabel = CABINS.find(c => c.id === cabin)?.label || "Executiva";

  // Get sorted options with miles for current cabin
  const getOptions = useCallback((destObj) => {
    if (!destObj) return [];
    return [...destObj.options].map(o => ({ ...o, miles: getMiles(o, cabin, destObj.region) }))
      .sort((a, b) => { if (a.bestPick && !b.bestPick) return -1; if (!a.bestPick && b.bestPick) return 1; if (a.miles && b.miles) return a.miles - b.miles; return a.miles ? -1 : 1; });
  }, [cabin]);

  const S = {
    input: { width: "100%", padding: "8px 6px", borderRadius: 6, border: "1.5px solid #2d2a3e", background: "#12102a", color: "#e2e8f0", fontSize: 12, boxSizing: "border-box", appearance: "none", WebkitAppearance: "none" },
    label: { fontSize: 9, color: "#94a3b8", fontWeight: 600, textTransform: "uppercase", letterSpacing: 0.8, display: "block", marginBottom: 3 },
    card: { padding: 10, borderRadius: 8, background: "#12102a", border: "1px solid #2d2a3e" },
    mono: { fontFamily: "'Space Mono', monospace" },
  };

  return (
    <div style={{ minHeight: "100vh", background: "linear-gradient(155deg, #0c0a1a 0%, #11102a 40%, #090818 100%)", color: "#e2e8f0", fontFamily: "'DM Sans', sans-serif", padding: "14px 12px" }}>
      <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />

      <div style={{ textAlign: "center", marginBottom: 14 }}>
        <div style={{ fontSize: 9, ...S.mono, color: "#818cf8", letterSpacing: 3, textTransform: "uppercase" }}>Miles Agent</div>
        <h1 style={{ fontSize: 17, fontWeight: 700, margin: "2px 0", background: "linear-gradient(135deg, #c7d2fe, #818cf8)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>Consultor de Milhas</h1>
        <div style={{ fontSize: 10, color: "#64748b" }}>
          {Object.values(PROGRAMS).map((p, i) => <span key={p.short}><span style={{ color: p.color, fontWeight: 600 }}>{p.short}</span>{i < 3 ? " · " : ""}</span>)}
        </div>
      </div>

      <div style={{ display: "flex", marginBottom: 12, borderRadius: 7, overflow: "hidden", border: "1px solid #2d2a3e" }}>
        {[{ id: "search", l: "Buscar" }, { id: "compare", l: "Comparar Custos" }, { id: "saved", l: `Salvos (${saved.length})` }].map(t => (
          <button key={t.id} onClick={() => setTab(t.id)} style={{ flex: 1, padding: "8px 0", fontSize: 10, fontWeight: 600, border: "none", background: tab === t.id ? "#1e1b3a" : "#0c0a1a", color: tab === t.id ? "#818cf8" : "#64748b", cursor: "pointer" }}>{t.l}</button>
        ))}
      </div>

      {/* ═══ SEARCH ═══ */}
      {tab === "search" && <>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6, marginBottom: 8 }}>
          <div>
            <label style={S.label}>Origem</label>
            <select value={origin} onChange={e => setOrigin(e.target.value)} style={S.input}>
              <optgroup label="São Paulo">{ORIGINS.filter(o => ["GRU","CGH","VCP"].includes(o.code)).map(o => <option key={o.code} value={o.code}>{o.short} — {o.city.split("(")[0].trim()}</option>)}</optgroup>
              <optgroup label="Outros BR">{ORIGINS.filter(o => !["GRU","CGH","VCP"].includes(o.code)).map(o => <option key={o.code} value={o.code}>{o.short} — {o.city.split("(")[0].trim()}</option>)}</optgroup>
              <optgroup label="Internacionais (volta)">{DESTS.map(d => <option key={d.code} value={d.code}>{d.flag} {d.code} — {d.city}</option>)}</optgroup>
            </select>
          </div>
          <div>
            <label style={S.label}>Destino</label>
            <select value={destCode} onChange={e => { setDestCode(e.target.value); setRes(null); setSelDate(null); }} style={{ ...S.input, color: destCode ? "#e2e8f0" : "#64748b" }}>
              <option value="">Selecione...</option>
              {regions.map(r => (<optgroup key={r} label={r}>{DESTS.filter(d => d.region === r).map(d => (<option key={d.code} value={d.code}>{d.flag} {d.city} ({d.code})</option>))}</optgroup>))}
            </select>
          </div>
        </div>

        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6, marginBottom: 8 }}>
          <div>
            <label style={S.label}>Classe</label>
            <select value={cabin} onChange={e => setCabin(e.target.value)} style={S.input}>{CABINS.map(c => <option key={c.id} value={c.id}>{c.label}</option>)}</select>
          </div>
          <div>
            <label style={S.label}>Passageiros</label>
            <div style={{ display: "flex", borderRadius: 6, overflow: "hidden", border: "1.5px solid #2d2a3e" }}>
              {[1, 2, 3, 4].map(p => (<button key={p} onClick={() => setPax(p)} style={{ flex: 1, padding: "7px 0", fontSize: 11, fontWeight: 600, border: "none", background: pax === p ? "#1e1b3a" : "#0c0a1a", color: pax === p ? "#818cf8" : "#64748b", cursor: "pointer" }}>{p}</button>))}
            </div>
          </div>
        </div>

        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 5, marginBottom: 12 }}>
          <div><label style={S.label}>Data alvo</label><input type="date" value={targetDate} onChange={e => setTargetDate(e.target.value)} style={S.input} /></div>
          <div>
            <label style={S.label}>Flexibilidade</label>
            <select value={range} onChange={e => setRange(Number(e.target.value))} style={S.input}>
              <option value={0}>Exato</option><option value={2}>±2 dias</option><option value={5}>±5 dias</option><option value={10}>±10 dias</option><option value={15}>±15 dias</option>
            </select>
          </div>
          <div>
            <label style={S.label}>Bônus iupp</label>
            <select value={bonus} onChange={e => setBonus(Number(e.target.value))} style={S.input}>
              {[0, 50, 80, 100].map(b => <option key={b} value={b}>{b === 0 ? "Sem" : `${b}%`}</option>)}
            </select>
          </div>
        </div>

        {range > 0 && (
          <div style={{ fontSize: 9, color: "#64748b", marginBottom: 10, textAlign: "center" }}>
            {new Date(df + "T12:00:00").toLocaleDateString("pt-BR", { day: "2-digit", month: "2-digit" })} a {new Date(dt + "T12:00:00").toLocaleDateString("pt-BR", { day: "2-digit", month: "2-digit" })} ({range * 2} dias)
          </div>
        )}

        {/* Main action: estimate availability */}
        <button onClick={doSearch} disabled={!dest || searching} style={{
          width: "100%", padding: 12, borderRadius: 8, border: "none",
          background: dest ? "linear-gradient(135deg, #4f46e5, #7c3aed)" : "#2d2a3e",
          color: dest ? "#fff" : "#64748b", fontSize: 13, fontWeight: 700,
          cursor: dest ? "pointer" : "not-allowed", marginBottom: 14, opacity: searching ? 0.6 : 1,
        }}>{searching ? "Estimando..." : "Estimativa de Disponibilidade"}</button>

        {/* Calendar */}
        {res && <>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
            <span style={{ fontSize: 11, fontWeight: 600 }}>Estimativa por data</span>
            <span style={{ fontSize: 9, color: "#64748b" }}>Toque para ver detalhes</span>
          </div>
          <div style={{ display: "flex", gap: 8, marginBottom: 6, fontSize: 8, color: "#94a3b8" }}>
            <span><span style={{ display: "inline-block", width: 8, height: 8, borderRadius: 2, background: "#052e16", border: "1px solid #166534", marginRight: 2, verticalAlign: "middle" }} />Alta prob.</span>
            <span><span style={{ display: "inline-block", width: 8, height: 8, borderRadius: 2, background: "#422006", border: "1px solid #854d0e", marginRight: 2, verticalAlign: "middle" }} />Média</span>
            <span><span style={{ display: "inline-block", width: 8, height: 8, borderRadius: 2, background: "#1e1b3a", border: "1px solid #3730a3", marginRight: 2, verticalAlign: "middle" }} />Baixa</span>
            <span><span style={{ display: "inline-block", width: 8, height: 8, borderRadius: 2, background: "transparent", border: "1.5px solid #c084fc", marginRight: 2, verticalAlign: "middle" }} />Alvo</span>
          </div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 2 }}>
            {res.map(r => {
              const isTarget = r.ds === targetDate;
              const bl = r.bestLikelihood;
              let bg = "#1e1b3a", bd = "#3730a3"; // low
              if (bl >= 55) { bg = "#052e16"; bd = "#166534"; } // high
              else if (bl >= 35) { bg = "#422006"; bd = "#854d0e"; } // medium
              if (selDate === r.ds) bd = "#e2e8f0";
              else if (isTarget) bd = "#c084fc";
              const day = r.date;
              return (
                <button key={r.ds} onClick={() => setSelDate(r.ds)} style={{
                  width: 34, height: 34, borderRadius: 5, fontSize: 10, fontWeight: 500,
                  background: bg, border: `1.5px solid ${bd}`, color: "#e2e8f0",
                  cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
                }}>
                  <span style={{ fontSize: 8, opacity: 0.5 }}>{day.toLocaleDateString("pt-BR", { weekday: "narrow" })}</span>
                  <span>{day.getDate()}</span>
                </button>
              );
            })}
          </div>

          {/* Date detail — this is where costs + links appear */}
          {selDate && (() => {
            const r = res.find(x => x.ds === selDate);
            if (!r) return null;
            const opts = getOptions(dest);
            return (
              <div style={{ marginTop: 14, padding: 12, borderRadius: 10, background: "#1e1b3a", border: "1px solid #2d2a3e" }}>
                <div style={{ fontSize: 13, fontWeight: 700, marginBottom: 10 }}>
                  {new Date(r.ds + "T12:00:00").toLocaleDateString("pt-BR", { weekday: "long", day: "numeric", month: "long" })}
                </div>

                {/* Per-partner: likelihood + cost + search link */}
                <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                  {r.partners.map((p, pi) => {
                    const prog = PROGRAMS[p.program];
                    const opt = opts.find(o => o.partner === p.partner);
                    const milesLeg = opt?.miles;
                    const milesRt = milesLeg ? milesLeg * 2 * pax : null;
                    const iupp = milesRt ? iuppCost(milesRt, bonus) : null;
                    const route = p.route ? p.route.replace("{O}", origin) : "";

                    // Likelihood bar
                    const lk = p.likelihood;
                    const lkColor = lk >= 55 ? "#4ade80" : lk >= 35 ? "#fbbf24" : "#f87171";
                    const lkLabel = lk >= 55 ? "Alta" : lk >= 35 ? "Média" : "Baixa";

                    return (
                      <div key={pi} style={{ padding: 10, borderRadius: 8, background: "#12102a", border: "1px solid #2d2a3e" }}>
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
                          <div style={{ display: "flex", alignItems: "center", gap: 5 }}>
                            <Pill program={p.program} />
                            <span style={{ fontSize: 11, fontWeight: 600, color: "#c7d2fe" }}>{p.partner}</span>
                          </div>
                          {opt?.bestPick && <span style={{ fontSize: 8, fontWeight: 700, padding: "0 5px", borderRadius: 3, background: "#052e16", color: "#4ade80", border: "1px solid #166534" }}>MELHOR</span>}
                        </div>

                        {route && <div style={{ fontSize: 9, color: "#64748b", marginBottom: 6 }}>{route}</div>}

                        {/* Likelihood bar */}
                        <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 6 }}>
                          <div style={{ flex: 1, height: 4, borderRadius: 2, background: "#2d2a3e", overflow: "hidden" }}>
                            <div style={{ width: `${lk}%`, height: "100%", borderRadius: 2, background: lkColor, transition: "width 0.3s" }} />
                          </div>
                          <span style={{ fontSize: 9, fontWeight: 600, color: lkColor, minWidth: 40 }}>{lkLabel} {lk}%</span>
                        </div>

                        {/* Cost */}
                        {milesRt ? (
                          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 4, marginBottom: 8 }}>
                            <div>
                              <div style={{ fontSize: 8, color: "#64748b", textTransform: "uppercase" }}>Milhas i/v {pax}pax</div>
                              <div style={{ fontSize: 14, fontWeight: 700, ...S.mono }}>{fmt(milesRt)}</div>
                            </div>
                            <div>
                              <div style={{ fontSize: 8, color: "#64748b", textTransform: "uppercase" }}>Pontos iupp ({bonus}%)</div>
                              <div style={{ fontSize: 14, fontWeight: 700, ...S.mono, color: "#818cf8" }}>{fmt(iupp)}</div>
                            </div>
                          </div>
                        ) : (
                          <div style={{ fontSize: 10, color: "#fbbf24", fontStyle: "italic", marginBottom: 8 }}>Preço dinâmico — verificar no site</div>
                        )}

                        {(p.surcharge || p.note) && (
                          <div style={{ display: "flex", gap: 3, marginBottom: 6, flexWrap: "wrap" }}>
                            {p.surcharge && <span style={{ fontSize: 8, padding: "1px 5px", borderRadius: 3, background: p.surcharge.includes("ALTO") ? "#7f1d1d" : "#1e1b3a", color: p.surcharge.includes("ALTO") ? "#fca5a5" : "#94a3b8", border: "1px solid " + (p.surcharge.includes("ALTO") ? "#991b1b" : "#2d2a3e") }}>Taxa: {p.surcharge}</span>}
                            {p.note && <span style={{ fontSize: 8, padding: "1px 5px", borderRadius: 3, background: "#1e1b3a", color: "#94a3b8", border: "1px solid #2d2a3e" }}>{p.note}</span>}
                          </div>
                        )}

                        <a href={buildSearchUrl(p.search, origin, destCode, r.ds, cabin, pax)} target="_blank" rel="noopener noreferrer" style={{
                          display: "block", padding: "6px 0", borderRadius: 5, textAlign: "center",
                          background: prog.color, color: "#fff", fontSize: 10, fontWeight: 600, textDecoration: "none",
                        }}>Verificar no {p.search} →</a>
                      </div>
                    );
                  })}
                </div>

                <button onClick={() => setSaved(p => [...p, { dest, origin, date: selDate, cabin, pax, bonus, id: Date.now() }])} style={{
                  width: "100%", padding: "8px 10px", borderRadius: 6, border: "1px solid #2d2a3e",
                  background: "#12102a", color: "#818cf8", fontSize: 10, fontWeight: 600, cursor: "pointer", marginTop: 10,
                }}>💾 Salvar esta data</button>
              </div>
            );
          })()}
        </>}
      </>}

      {/* ═══ COMPARE ═══ */}
      {tab === "compare" && <div>
        <div style={{ fontSize: 11, fontWeight: 700, marginBottom: 4, color: "#c7d2fe" }}>{cabinLabel} · i/v {pax}pax · Bônus {bonus}%</div>
        <div style={{ fontSize: 9, color: "#64748b", marginBottom: 10 }}>Custo em pontos iupp (melhor programa por destino)</div>
        <div style={{ display: "flex", gap: 3, marginBottom: 10, flexWrap: "wrap" }}>
          <button onClick={() => setRegionFilter("")} style={{ padding: "3px 7px", borderRadius: 3, fontSize: 8, fontWeight: 600, border: "1px solid #2d2a3e", background: !regionFilter ? "#1e1b3a" : "#0c0a1a", color: !regionFilter ? "#e2e8f0" : "#64748b", cursor: "pointer" }}>Todos</button>
          {regions.map(r => (
            <button key={r} onClick={() => setRegionFilter(regionFilter === r ? "" : r)} style={{
              padding: "3px 7px", borderRadius: 3, fontSize: 8, fontWeight: 600,
              border: `1px solid ${regionFilter === r ? (REGION_COLORS[r]||"#818cf8") + "60" : "#2d2a3e"}`,
              background: regionFilter === r ? (REGION_COLORS[r]||"#818cf8") + "15" : "#0c0a1a",
              color: regionFilter === r ? REGION_COLORS[r] : "#64748b", cursor: "pointer",
            }}>{r}</button>
          ))}
        </div>
        {(regionFilter ? DESTS.filter(d => d.region === regionFilter) : DESTS)
          .map(d => { const opts = getOptions(d).filter(o => o.miles); const best = opts[0]; return best ? { d, best } : null; })
          .filter(Boolean)
          .sort((a, b) => iuppCost(a.best.miles * 2 * pax, bonus) - iuppCost(b.best.miles * 2 * pax, bonus))
          .map(({ d, best }) => {
            const milesRt = best.miles * 2 * pax;
            const cost = iuppCost(milesRt, bonus);
            return (
              <div key={d.code} onClick={() => { setDestCode(d.code); setTab("search"); setRes(null); }} style={{ ...S.card, marginBottom: 5, cursor: "pointer" }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 2 }}>
                  <span style={{ fontSize: 12, fontWeight: 600 }}>{d.flag} {d.city}</span>
                  <div style={{ display: "flex", alignItems: "center", gap: 5 }}>
                    <Pill program={best.program} tiny />
                    <span style={{ fontSize: 12, fontWeight: 700, ...S.mono, color: "#818cf8" }}>{fmt(cost)} pts</span>
                  </div>
                </div>
                <div style={{ fontSize: 8, color: "#64748b" }}>{best.partner} · {fmt(milesRt)} milhas {PROGRAMS[best.program].short}</div>
              </div>
            );
          })}
      </div>}

      {/* ═══ SAVED ═══ */}
      {tab === "saved" && <div>
        {saved.length === 0 ? (
          <div style={{ textAlign: "center", padding: 32, color: "#64748b", fontSize: 11 }}>Nenhuma busca salva.</div>
        ) : saved.map(s => (
          <div key={s.id} style={{ ...S.card, marginBottom: 5 }}>
            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 3 }}>
              <span style={{ fontSize: 12, fontWeight: 700 }}>{s.dest.flag} {s.origin}→{s.dest.city}</span>
              <span style={{ fontSize: 10, color: "#94a3b8" }}>{new Date(s.date + "T12:00:00").toLocaleDateString("pt-BR")}</span>
            </div>
            <div style={{ fontSize: 9, color: "#94a3b8", marginBottom: 6 }}>{CABINS.find(c => c.id === s.cabin)?.label} · {s.pax}pax · Bônus {s.bonus}%</div>
            <div style={{ display: "flex", gap: 4 }}>
              {["aa.com", "smiles.com.br", "flytap.com"].map(site => {
                const url = buildSearchUrl(site, s.origin, s.dest.code, s.date, s.cabin, s.pax);
                const colors = { "aa.com": "#e11d48", "smiles.com.br": "#f97316", "flytap.com": "#059669" };
                const labels = { "aa.com": "AA", "smiles.com.br": "Smiles", "flytap.com": "TAP" };
                return <a key={site} href={url} target="_blank" rel="noopener noreferrer" style={{ flex: 1, padding: 6, borderRadius: 5, background: colors[site], color: "#fff", fontSize: 9, fontWeight: 600, textAlign: "center", textDecoration: "none" }}>{labels[site]}</a>;
              })}
              <button onClick={() => setSaved(p => p.filter(x => x.id !== s.id))} style={{ padding: "6px 8px", borderRadius: 5, border: "1px solid #2d2a3e", background: "#12102a", color: "#f87171", fontSize: 9, cursor: "pointer" }}>✕</button>
            </div>
          </div>
        ))}
      </div>}

      <div style={{ textAlign: "center", marginTop: 16, fontSize: 8, color: "#475569", lineHeight: 1.5 }}>
        Estimativas baseadas em padrões históricos por companhia · Sempre confirme no site antes de transferir pontos
      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
